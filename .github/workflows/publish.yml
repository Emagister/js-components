name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Bump version, tag, release and publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Calculate next version (dry run)
        id: dry_run
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ steps.app_token.outputs.token }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          initial_version: 1.0.0
          dry_run: true

      - name: Update package.json and CHANGELOG.md
        env:
          NEW_VERSION: ${{ steps.dry_run.outputs.new_version }}
          CHANGELOG: ${{ steps.dry_run.outputs.changelog }}
        run: |
          npm version "$NEW_VERSION" --no-git-tag-version

          # Prepend new entry to CHANGELOG.md
          HEADER="# Changelog"
          if [ -f CHANGELOG.md ]; then
            EXISTING=$(tail -n +2 CHANGELOG.md)
          else
            EXISTING=""
          fi
          printf '%s\n\n%s\n\n%s\n' "$HEADER" "$CHANGELOG" "$EXISTING" > CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]"
          git push https://x-access-token:${{ steps.app_token.outputs.token }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ steps.app_token.outputs.token }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          initial_version: 1.0.0

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          token: ${{ steps.app_token.outputs.token }}
          skipIfReleaseExists: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies and build
        run: npm ci && npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
