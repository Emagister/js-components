name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Bump version, tag and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version (dry run)
        id: dry_run
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          initial_version: 1.0.0
          dry_run: true

      - name: Update package.json and CHANGELOG.md
        run: |
          NEW_VERSION="${{ steps.dry_run.outputs.new_version }}"
          NEW_TAG="${{ steps.dry_run.outputs.new_tag }}"
          CHANGELOG="${{ steps.dry_run.outputs.changelog }}"

          npm version "$NEW_VERSION" --no-git-tag-version

          # Prepend new entry to CHANGELOG.md
          HEADER="# Changelog"
          if [ -f CHANGELOG.md ]; then
            EXISTING=$(tail -n +2 CHANGELOG.md)
          else
            EXISTING=""
          fi
          printf '%s\n\n%s\n\n%s\n' "$HEADER" "$CHANGELOG" "$EXISTING" > CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          initial_version: 1.0.0

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
          skipIfReleaseExists: true
